name: Deploy Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [rebuild]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Check out ziium source
        uses: actions/checkout@v4
        with:
          repository: ziium/ziium
          path: _ziium

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: wasm-pack build --release --target web --out-dir ../pkg
        working-directory: _ziium

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js story.html story.js rosetta.html rosetta.js changelog.html _site/
          cp -r pkg _site/pkg
          cp -r ziium _site/ziium
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
