<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <link rel="canonical" href="https://ziium.github.io/story.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ziium" />
    <meta property="og:title" content="ziium — 숲속의 용사: 인터랙티브 한국어 코딩 데모" />
    <meta property="og:description" content="한국어 프로그래밍 언어 지음으로 만든 인터랙티브 텍스트 어드벤처. 선택지를 고르며 한국어 코드가 실행됩니다." />
    <meta property="og:url" content="https://ziium.github.io/story.html" />
    <meta property="og:image" content="https://ziium.github.io/og/story.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://ziium.github.io/og/story.png" />
    <meta name="twitter:title" content="ziium — 숲속의 용사" />
    <meta name="twitter:description" content="한국어 프로그래밍 언어 지음으로 만든 인터랙티브 텍스트 어드벤처 게임." />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .story-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      @media (max-width: 800px) {
        .story-layout { grid-template-columns: 1fr; }
      }
      .story-header {
        text-align: center;
        padding: 2rem 1rem 0.5rem;
      }
      .story-header h1 { font-size: 1.6rem; margin: 0; color: var(--ink); }
      .story-header p { color: var(--muted); margin: 0.4rem 0 0; font-size: 0.95rem; }
      .story-header .back-link {
        display: inline-block;
        margin-top: 0.8rem;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
      }
      .story-panel {
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .story-panel h3 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 0.8rem;
      }
      .story-panel:first-of-type {
        height: 70vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #storyScroll {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }
      #storyOutput {
        font-family: "IBM Plex Sans KR", sans-serif;
        font-size: 1.05rem;
        line-height: 1.7;
        white-space: pre-wrap;
        color: var(--ink);
      }
      .choices-fixed {
        flex-shrink: 0;
        border-top: 1px solid var(--line);
        padding-top: 0.8rem;
        margin-top: 0.6rem;
      }
      #storyOutput .scene-title {
        font-weight: 700;
        color: var(--accent-strong);
        display: block;
        margin-top: 0.6rem;
      }
      .choices {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        margin-top: 1.2rem;
      }
      .choice-btn {
        background: var(--paper);
        border: 2px solid var(--accent);
        border-radius: 8px;
        padding: 0.7rem 1.2rem;
        font-size: 1rem;
        font-family: "IBM Plex Sans KR", sans-serif;
        color: var(--accent-strong);
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        text-align: left;
      }
      .choice-btn:hover {
        background: var(--accent-soft);
        transform: translateX(4px);
      }
      .choice-btn:active { transform: translateX(2px); }
      #codeView {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.82rem;
        line-height: 1.6;
        white-space: pre;
        overflow-x: auto;
        color: var(--ink);
        max-height: 520px;
        overflow-y: auto;
      }
      .restart-btn {
        margin-top: 1rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        font-family: "IBM Plex Sans KR", sans-serif;
        cursor: pointer;
      }
      .restart-btn:hover { background: var(--accent-strong); }
      .status-msg {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 0.6rem;
      }
    </style>
  </head>
  <body>
    <div class="halo halo-left"></div>
    <div class="halo halo-right"></div>

    <div class="story-header">
      <h1>숲속의 용사</h1>
      <p>한국어 비교 · 상대적 변화 · 선택 프레임을 보여주는 인터랙티브 데모</p>
      <a class="back-link" href="./index.html">playground로 돌아가기</a>
    </div>

    <div class="story-layout">
      <div class="story-panel">
        <h3>Story</h3>
        <div id="storyScroll">
          <div id="storyOutput">로딩 중...</div>
        </div>
        <div class="choices-fixed">
          <div id="choicesArea" class="choices"></div>
          <p id="statusMsg" class="status-msg"></p>
        </div>
      </div>
      <div class="story-panel">
        <h3>Source</h3>
        <div id="codeView"></div>
      </div>
    </div>

    <script type="module" src="./story.js"></script>
  </body>
</html>
